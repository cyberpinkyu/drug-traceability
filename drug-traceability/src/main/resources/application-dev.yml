spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/drug_traceability?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:114514}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DB:0}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

ai:
  deepseek:
    api-key: ${AI_DEEPSEEK_API_KEY:your-api-key}
  embedding:
    model: ${AI_EMBEDDING_MODEL:BGE-M3}
  milvus:
    host: ${MILVUS_HOST:localhost}
    port: ${MILVUS_PORT:19530}
    collection-name: ${MILVUS_COLLECTION:drug_knowledge}

trace:
  scan:
    allow-sign-endpoint: true
