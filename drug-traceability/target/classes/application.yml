spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.drug.entity

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-me-please-change-me-123456789012}
  access-expire-seconds: ${JWT_ACCESS_EXPIRE_SECONDS:7200}
  refresh-expire-seconds: ${JWT_REFRESH_EXPIRE_SECONDS:604800}
