<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>API Test</title>
</head>
<body>
    <h1>API Test</h1>
    <button onclick="testApi()">Test Drug API</button>
    <div id="result"></div>
    
    <script>
        async function testApi() {
            try {
                const response = await fetch('http://localhost:8080/drug/info');
                const data = await response.json();
                document.getElementById('result').innerHTML = 
                    '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    '<p style="color:red;">Error: ' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
